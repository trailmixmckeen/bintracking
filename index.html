<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BR Production Bin Tracking</title>
    <!-- Tailwind CSS for clean layout utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Define custom green color variables and apply styles */
        :root {
            --brand-green: #6BF4AD;
            --brand-green-hover: #56dca2;
        }
        
        .bg-brand { background-color: var(--brand-green); }
        .hover\:bg-brand-hover:hover { background-color: var(--brand-green-hover); }
        .focus\:ring-brand:focus { --tw-ring-color: var(--brand-green); }
        
        /* Prevents double-tap zooming on mobile touch targets */
        button { touch-action: manipulation; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 pb-12 select-none">

    <!-- Header styled in requested brand green with high-contrast text -->
    <header class="bg-brand text-gray-900 shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <!-- Swapped Emoji out for your repository's local logo asset -->
                <img src="bleacher_black.png" alt="Logo" class="h-8 w-auto object-contain">
                <h1 id="binHeader" class="text-lg font-bold tracking-tight">Bin: Loading...</h1>
            </div>
            <span id="loadingSpinner" class="animate-spin h-5 w-5 border-2 border-gray-900 border-t-transparent rounded-full hidden"></span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-3 space-y-3">
        <!-- Error alert overlay if connection fails -->
        <div id="errorAlert" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative hidden" role="alert"></div>

        <!-- Add Item Row Card - Fluid width container -->
        <div class="bg-white rounded-xl shadow p-3">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Add New Item</h2>
            <div class="flex gap-2">
                <input type="number" id="newItemQty" placeholder="Qty" value="1" 
                       class="w-14 border border-gray-300 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-brand focus:outline-none">
                <input type="text" id="newItemName" placeholder="Item name..." 
                       class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:outline-none">
                <button onclick="addNewItem()" 
                        class="bg-brand hover:bg-brand-hover text-gray-900 px-4 py-2 rounded-lg font-bold transition-all text-sm shrink-0">+</button>
            </div>
        </div>

        <!-- Inventory List Card -->
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="px-3 py-2 bg-gray-100 border-b border-gray-200 flex justify-between items-center">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Current Inventory</span>
                <span id="itemCount" class="text-xs text-gray-500 font-medium">0 items</span>
            </div>
            <ul id="inventoryList" class="divide-y divide-gray-100">
                <!-- Items are programmatically injected here -->
                <li class="p-8 text-center text-gray-400 italic text-sm">No items found. Tap "+" above to log some!</li>
            </ul>
        </div>
    </main>

    <script>
        // REPLACE WITH YOUR COPIED GOOGLE APPS SCRIPT DEPLOYMENT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztE36-ep91fpfYaFDzraCC5Hw4qcwcBDew_YxVRPT_ZtsgCVWRxJwQCmiS_NEcSteUYw/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const currentBin = urlParams.get('bin') || "BIN01"; 

        document.getElementById("binHeader").textContent = `Bin: ${currentBin}`;

        let cachedItems = [];

        // Fetch Items from Google Sheets via Web App API
        async function fetchInventory() {
            showLoading(true);
            try {
                const response = await fetch(`${SCRIPT_URL}?bin=${currentBin}`);
                const data = await response.json();
                cachedItems = data.items || [];
                renderInventory();
            } catch (err) {
                showError("Could not retrieve spreadsheet data. Ensure the Apps Script URL is correct.");
            } finally {
                showLoading(false);
            }
        }

        // Render responsive list interface elements
        function renderInventory() {
            const listContainer = document.getElementById("inventoryList");
            const countContainer = document.getElementById("itemCount");
            listContainer.innerHTML = "";
            countContainer.textContent = `${cachedItems.length} items`;

            if (cachedItems.length === 0) {
                listContainer.innerHTML = `<li class="p-8 text-center text-gray-400 italic text-sm">No items found. Tap "+" above to log some!</li>`;
                return;
            }

            cachedItems.forEach(item => {
                const li = document.createElement("li");
                // Uses flexbox wrapping controls and small padding to fit narrow phone screens perfectly
                li.className = "flex items-center justify-between p-3 gap-2 hover:bg-gray-50 text-sm";
                li.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <input type="text" value="${item.item}" onchange="updateItemField(${item.rowIndex}, 'item', this.value)" 
                               class="w-full font-medium bg-transparent border-b border-transparent hover:border-gray-300 focus:border-emerald-400 focus:bg-white focus:outline-none rounded px-1 py-0.5 transition-all truncate text-gray-700">
                    </div>
                    <div class="flex items-center gap-1.5 shrink-0">
                        <button onclick="adjustQty(${item.rowIndex}, -1)" class="w-8 h-8 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:scale-90 rounded-full text-base font-semibold text-gray-600">-</button>
                        <span class="w-6 text-center font-bold text-gray-800">${item.quantity}</span>
                        <button onclick="adjustQty(${item.rowIndex}, 1)" class="w-8 h-8 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:scale-90 rounded-full text-base font-semibold text-gray-600">+</button>
                        <button onclick="deleteItem(${item.rowIndex})" class="ml-1 text-gray-400 hover:text-red-500 active:scale-90 p-1 text-base transition-colors" title="Delete">
                            🗑️
                        </button>
                    </div>
                `;
                listContainer.appendChild(li);
            });
        }

        // Add Item
        async function addNewItem() {
            const qtyInput = document.getElementById("newItemQty");
            const nameInput = document.getElementById("newItemName");
            const qty = parseInt(qtyInput.value) || 1;
            const name = nameInput.value.trim();

            if (!name) return;

            showLoading(true);
            try {
                await sendUpdate({ bin: currentBin, action: "add", quantity: qty, item: name });
                nameInput.value = "";
                qtyInput.value = "1";
                await fetchInventory();
            } catch (err) {
                showError("Failed to add item.");
            }
        }

        // Quick Adjust quantity buttons
        async function adjustQty(rowIndex, delta) {
            const targetItem = cachedItems.find(i => i.rowIndex === rowIndex);
            if (!targetItem) return;
            const newQty = Math.max(0, parseInt(targetItem.quantity) + delta);
            
            showLoading(true);
            try {
                await sendUpdate({ bin: currentBin, action: "update", rowIndex: rowIndex, quantity: newQty, item: targetItem.item });
                await fetchInventory();
            } catch (err) {
                showError("Failed to update quantity.");
            }
        }

        // Update Text on Input Change
        async function updateItemField(rowIndex, field, value) {
            const targetItem = cachedItems.find(i => i.rowIndex === rowIndex);
            if (!targetItem) return;
            
            showLoading(true);
            try {
                await sendUpdate({ 
                    bin: currentBin, 
                    action: "update", 
                    rowIndex: rowIndex, 
                    quantity: field === 'qty' ? value : targetItem.quantity, 
                    item: field === 'item' ? value : targetItem.item 
                });
                await fetchInventory();
            } catch (err) {
                showError("Failed to update item name.");
            }
        }

        // Delete Item Row
        async function deleteItem(rowIndex) {
            if (!confirm("Are you sure you want to remove this item?")) return;
            showLoading(true);
            try {
                await sendUpdate({ bin: currentBin, action: "delete", rowIndex: rowIndex });
                await fetchInventory();
            } catch (err) {
                showError("Failed to delete item.");
            }
        }

        // Helper API Poster
        async function sendUpdate(payload) {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            });
            await new Promise(resolve => setTimeout(resolve, 600));
        }

        function showLoading(show) {
            const spinner = document.getElementById("loadingSpinner");
            show ? spinner.classList.remove("hidden") : spinner.classList.add("hidden");
        }

        function showError(msg) {
            const alertBox = document.getElementById("errorAlert");
            alertBox.textContent = msg;
            alertBox.classList.remove("hidden");
            setTimeout(() => alertBox.classList.add("hidden"), 5000);
        }

        fetchInventory();
    </script>
</body>
</html>
